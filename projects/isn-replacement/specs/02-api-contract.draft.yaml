            type: string
            format: uuid
        - $ref: "#/components/parameters/pathId"
      responses:
        "204":
          description: "Time-off removed"

  /technicians/{userId}/zips:
    get:
      summary: "List ZIP coverage for a technician"
      operationId: listTechnicianZips
      tags: [technician-availability]
      x-required-permissions:
        all: ["view.business"]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "ZIP coverage list"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TechnicianZipResponse"

    post:
      summary: "Add a ZIP to technician coverage"
      operationId: addTechnicianZip
      tags: [technician-availability]
      x-required-permissions:
        all: ["manage.technician_availability"]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [zip]
              properties:
                zip:
                  type: string
                priority:
                  type: integer
                  minimum: 1
                  maximum: 5
                  default: 1
      responses:
        "201":
          description: "ZIP added"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TechnicianZipResponse"

  /technicians/{userId}/zips/{zip}:
    delete:
      summary: "Remove a ZIP from technician coverage"
      operationId: deleteTechnicianZip
      tags: [technician-availability]
      x-required-permissions:
        all: ["manage.technician_availability"]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: zip
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: "ZIP removed"

  # ------------------------------------------------------------------
  # SLOT FINDER
  # ------------------------------------------------------------------

  /calendar/available-slots:
    get:
      summary: "Find available scheduling slots for one or all technicians"
      operationId: getAvailableSlots
      tags: [calendar]
      x-required-permissions:
        all: ["view.calendar", "view.inspection"]
      parameters:
        - name: inspectorId
          in: query
          schema:
            type: string
            format: uuid
          description: "Specific technician. Omit for cross-inspector search (all active technicians in business)."
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: "Start of search window (UTC)"
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: "End of search window (UTC)"
        - name: serviceIds
          in: query
          schema:
            type: string
          description: "Comma-separated service UUIDs to drive duration calculation"
        - name: zip
          in: query
          schema:
            type: string
          description: "Filter to technicians whose ZIP coverage includes this ZIP"
        - name: durationMinutes
          in: query
          schema:
            type: integer
          description: "Override computed duration. If omitted, derived from serviceIds."
      responses:
        "200":
          description: "Available slots"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AvailableSlotResponse"
                  searchMeta:
                    type: object
                    properties:
                      from:
                        type: string
                        format: date-time
                      to:
                        type: string
                        format: date-time
                      durationMinutes:
                        type: integer
                      techniciansSearched:
                        type: integer

  # ------------------------------------------------------------------
  # INSPECTIONS
  # ------------------------------------------------------------------

  /inspections:
    get:
      summary: "List inspections in the active business"
      operationId: listInspections
      tags: [inspections]
      x-required-permissions:
        all: ["view.inspection"]
      parameters:
        - name: status
          in: query
          schema:
            type: string
          description: "Comma-separated status values to filter. e.g. scheduled,confirmed"
        - name: inspectorId
          in: query
          schema:
            type: string
            format: uuid
        - name: customerId
          in: query
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          description: "scheduledAt >= from"
        - name: to
          in: query
          schema:
            type: string
            format: date-time
          description: "scheduledAt <= to"
        - name: q
          in: query
          schema:
            type: string
          description: "Search by order number or property address"
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: "Paginated inspection list. PII via customer/property is masked unless view.customer.pii."
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/InspectionResponse"
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"

    post:
      summary: "Create (book) a new inspection"
      operationId: createInspection
      tags: [inspections]
      x-required-permissions:
        all: ["create.inspection", "view.customer", "view.property"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [serviceIds, feeAmount]
              properties:
                customerId:
                  type: string
                  format: uuid
                  nullable: true
                propertyId:
                  type: string
                  format: uuid
                  nullable: true
                leadInspectorId:
                  type: string
                  format: uuid
                  nullable: true
                scheduledAt:
                  type: string
                  format: date-time
                  nullable: true
                  description: "Null creates on_hold inspection."
                durationMinutes:
                  type: integer
                  nullable: true
                  description: "Overrides service-derived duration."
                serviceIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: "Services to attach as line items."
                feeAmount:
                  type: string
                  description: "Decimal string total fee (dispatcher-confirmed, may override sum of service base fees)."
                specialInstructions:
                  type: string
                  nullable: true
                internalNotes:
                  type: string
                  nullable: true
                source:
                  type: string
                  enum: [dispatcher, realtor_portal, client_booking, phone, email, api]
                  default: dispatcher
                billToParticipantId:
                  type: string
                  format: uuid
                  nullable: true
                participants:
                  type: array
                  items:
                    type: object
                    required: [participantId, roleInTransaction]
                    properties:
                      participantId:
                        type: string
                        format: uuid
                      roleInTransaction:
                        type: string
                        enum: [buyer_agent, listing_agent, transaction_coordinator, escrow_officer, insurance_agent, lender, attorney, seller, other]
      responses:
        "201":
          description: "Inspection created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InspectionResponse"
        "409":
          description: "Conflict (inspector already booked, order number collision)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: "Semantic error (outside business hours, invalid status transition)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /inspections/stats:
    get:
      summary: "Dashboard statistics for the active business"
      operationId: getInspectionStats
      tags: [inspections]
      x-required-permissions:
        all: ["view.dashboard", "view.inspection"]
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: "Aggregated statistics"
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalInspections:
                    type: integer
                  byStatus:
                    type: object
                    additionalProperties:
                      type: integer
                  byPaymentStatus:
                    type: object
                    additionalProperties:
                      type: integer
                  bySignatureStatus:
                    type: object
                    additionalProperties:
                      type: integer
                  reportsReleased:
                    type: integer
                  totalRevenue:
                    type: string
                    description: "Decimal string. Only returned when user has view.financial."
                  totalOutstanding:
                    type: string
                    description: "Decimal string. Only returned when user has view.financial."

  /inspections/conflicts:
    get:
      summary: "Check inspector scheduling conflicts for a proposed slot"
      operationId: checkConflicts
      tags: [inspections]
      x-required-permissions:
        all: ["view.inspection", "view.calendar"]
      parameters:
        - name: inspectorId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: scheduledAt
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: durationMinutes
          in: query
          required: true
          schema:
            type: integer
        - name: excludeInspectionId
          in: query
          schema:
            type: string
            format: uuid
          description: "Exclude this inspection from conflict check (for reschedule scenarios)."
      responses:
        "200":
          description: "Conflict check result"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictCheckResponse"

  /inspections/{id}:
    get:
      summary: "Get a single inspection"
      operationId: getInspection
      tags: [inspections]
      x-required-permissions:
        all: ["view.inspection"]
      parameters:
        - $ref: "#/components/parameters/pathId"
      responses:
        "200":
          description: "Inspection. PII masked unless view.customer.pii. internalNotes masked unless view.inspection.internal_notes."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InspectionResponse"
        "404":
          description: "Not found (or cross-account hide)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      summary: "Update inspection fields (general edits)"
      operationId: updateInspection
      tags: [inspections]
      x-required-permissions:
        all: ["edit.inspection"]
      parameters:
        - $ref: "#/components/parameters/pathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                specialInstructions:
                  type: string
                  nullable: true
                internalNotes:
                  type: string
                  nullable: true
                billToParticipantId:
                  type: string
                  format: uuid
                  nullable: true
                feeAmount:
                  type: string
                  nullable: true
                customFields:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: "Updated inspection"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InspectionResponse"

    delete:
      summary: "Soft-delete an inspection (administrative removal, distinct from cancel)"
      operationId: deleteInspection
      tags: [inspections]
      x-required-permissions:
        all: ["delete.inspection"]
      parameters:
        - $ref: "#/components/parameters/pathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
      responses:
        "204":
          description: "Soft-deleted"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /inspections/{id}/assign:
    patch:
      summary: "Assign or reassign the lead inspector"
      operationId: assignInspector
      tags: [inspections]
      x-required-permissions:
        all: ["edit.inspection.assign"]
      parameters:
        - $ref: "#/components/parameters/pathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [inspectorId]
              properties:
                inspectorId:
                  type: string
                  format: uuid
                  nullable: true
                  description: "Null to unassign."
      responses:
        "200":
          description: "Inspector assigned"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InspectionResponse"
        "409":
          description: "Conflict with inspector's schedule"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ErrorResponse"
                  - type: object
                    properties:
                      conflicts:
                        $ref: "#/components/schemas/ConflictCheckResponse"

  /inspections/{id}/reschedule:
    post:
      summary: "Reschedule an inspection (change date/time, optionally change inspector)"
      operationId: rescheduleInspection
      tags: [inspections]
      x-required-permissions:
        all: ["edit.inspection.reschedule"]
      parameters:
        - $ref: "#/components/parameters/pathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                scheduledAt:
                  type: string
                  format: date-time
                  nullable: true
                  description: "Null transitions to on_hold."
                durationMinutes:
                  type: integer
                  nullable: true
                inspectorId:
                  type: string
                  format: uuid
                  nullable: true
                reason:
                  type: string
      responses:
        "200":
          description: "Rescheduled. A reschedule_history row is created."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InspectionResponse"
        "422":
          description: "Conflict or outside business hours (warn-not-block; conflict info included)"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ErrorResponse"
                  - type: object
                    properties:
                      conflicts:
                        $ref: "#/components/schemas/ConflictCheckResponse"

  /inspections/{id}/cancel:
    post:
      summary: "Cancel an inspection (operational state; sets status=cancelled)"
      operationId: cancelInspection
      tags: [inspections]
      x-required-permissions:
        all: ["cancel.inspection"]
      parameters:
        - $ref: "#/components/parameters/pathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cancelReason]
              properties:
                cancelReason:
                  type: string
      responses:
        "200":
          description: "Cancelled"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InspectionResponse"

  /inspections/{id}/status:
    patch:
      summary: "Transition inspection status (inspector-facing: en_route, in_progress, completed, no_show)"
      operationId: updateInspectionStatus
      tags: [inspections]
      x-required-permissions:
        all: ["edit.inspection.status"]
      parameters:
        - $ref: "#/components/parameters/pathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [confirmed, en_route, in_progress, completed, no_show]
                  description: "allowed transitions per state machine; invalid transitions return 422."
      responses:
        "200":
          description: "Status updated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InspectionResponse"
        "422":
          description: "Invalid status transition"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /inspections/{id}/release:
    post:
      summary: "Mark report as released (requires payment, signature, and uploaded report)"
      operationId: releaseReport
      tags: [inspections]
      x-required-permissions:
        all: ["release.report"]
      parameters:
        - $ref: "#/components/parameters/pathId"
      responses:
        "200":
          description: "Report released"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InspectionResponse"
        "422":
          description: "Release conditions not met (unpaid, unsigned, or no report)"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ErrorResponse"
                  - type: object
                    properties:
                      blockedReasons:
                        type: array
                        items:
                          type: string

  /inspections/{id}/release-override:
    post:
      summary: "Release report despite unmet conditions (admin override)"
      operationId: releaseReportOverride
      tags: [inspections]
      x-required-permissions:
        all: ["override.report_release_gate"]
      parameters:
        - $ref: "#/components/parameters/pathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: "Report released via override"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InspectionResponse"

  /inspections/{id}/reschedule-history:
    get:
      summary: "List reschedule history for an inspection"
      operationId: listRescheduleHistory
      tags: [inspections]
      x-required-permissions:
        all: ["view.inspection"]
      parameters:
        - $ref: "#/components/parameters/pathId"
      responses:
        "200":
          description: "Reschedule history in chronological order"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/RescheduleHistoryItem"

  /inspections/{id}/services:
    get:
      summary: "List service line items on an inspection"
      operationId: listInspectionServices
      tags: [inspections]
      x-required-permissions:
        all: ["view.inspection"]
      parameters:
        - $ref: "#/components/parameters/pathId"
      responses:
        "200":
          description: "Service line items"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/InspectionServiceLineItem"

    post:
      summary: "Add a service line item to an inspection"
      operationId: addInspectionService
      tags: [inspections]
      x-required-permissions:
        all: ["edit.inspection"]
      parameters:
        - $ref: "#/components/parameters/pathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [serviceId, fee]
              properties:
                serviceId:
                  type: string
                  format: uuid
                fee:
                  type: string
                durationMinutes:
                  type: integer
                  nullable: true
                notes:
                  type: string
                  nullable: true
      responses:
        "201":
          description: "Line item added"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InspectionServiceLineItem"

  /inspection-services/{id}:
    delete:
      summary: "Remove a service line item from an inspection"
      operationId: deleteInspectionService
      tags: [inspections]
      x-required-permissions:
        all: ["edit.inspection"]
      parameters:
        - $ref: "#/components/parameters/pathId"
      responses:
        "204":
          description: "Line item removed"

  # ------------------------------------------------------------------
  # TRANSACTION PARTICIPANTS AND AGENCIES
  # ------------------------------------------------------------------

  /participants:
    get:
      summary: "List transaction participants in the active account"
      operationId: listParticipants
      tags: [participants]
      x-required-permissions:
        all: ["view.transaction_participant"]
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: "Search by name or email"
        - name: primaryRole
          in: query
          schema:
            type: string
        - name: agencyId
          in: query
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: "Participants. PII masked unless view.customer.pii."
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TransactionParticipantResponse"
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"

    post:
      summary: "Create a transaction participant"
      operationId: createParticipant
      tags: [participants]
      x-required-permissions:
        all: ["create.transaction_participant"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [displayName]
              properties:
                agencyId:
                  type: string
                  format: uuid
                  nullable: true
                displayName:
                  type: string
                firstName:
                  type: string
                  nullable: true
                lastName:
                  type: string
                  nullable: true
                email:
                  type: string
                  nullable: true
                phone:
                  type: string
                  nullable: true
                mobile:
                  type: string
                  nullable: true
                primaryRole:
                  type: string
                  nullable: true
      responses:
        "201":
          description: "Participant created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionParticipantResponse"

  /participants/{id}:
    get:
      summary: "Get a transaction participant"
      operationId: getParticipant
      tags: [participants]
      x-required-permissions:
        all: ["view.transaction_participant"]
      parameters:
        - $ref: "#/components/parameters/pathId"
      responses:
        "200":
          description: "Participant. PII masked unless view.customer.pii."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionParticipantResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      summary: "Update a transaction participant"
      operationId: updateParticipant
      tags: [participants]
      x-required-permissions:
        all: ["edit.transaction_participant"]
      parameters:
        - $ref: "#/components/parameters/pathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agencyId:
                  type: string
                  format: uuid
                  nullable: true
                displayName:
                  type: string
                email:
                  type: string
                  nullable: true
                phone:
                  type: string
                  nullable: true
                primaryRole:
                  type: string
                  nullable: true
      responses:
        "200":
          description: "Updated participant"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionParticipantResponse"

  /agencies:
    get:
      summary: "List agencies in the active account"
      operationId: listAgencies
      tags: [agencies]
      x-required-permissions:
        all: ["view.agency"]
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: "Search by name"
        - name: active
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: "Agency list"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AgencyResponse"

    post:
      summary: "Create an agency"
      operationId: createAgency
      tags: [agencies]
      x-required-permissions:
        all: ["edit.agency"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                phone:
                  type: string
                  nullable: true
                email:
                  type: string
                  nullable: true
                address:
                  type: string
                  nullable: true
                city:
                  type: string
                  nullable: true
                state:
                  type: string
                  nullable: true
                zip:
                  type: string
                  nullable: true
      responses:
        "201":
          description: "Agency created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencyResponse"

  # ------------------------------------------------------------------
  # AUDIT LOG
  # ------------------------------------------------------------------

  /audit-log:
    get:
      summary: "Query audit log"
      operationId: queryAuditLog
      tags: [audit]
      x-required-permissions:
        all: ["view.audit_log"]
      parameters:
        - name: entityType
          in: query
          schema:
            type: string
        - name: entityId
          in: query
          schema:
            type: string
            format: uuid
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
        - name: action
          in: query
          schema:
            type: string
        - name: outcome
          in: query
          schema:
            type: string
            enum: [success, denied, failed, partial]
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: "Audit log entries, newest first."
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditLogEntryResponse"
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"

  # ------------------------------------------------------------------
  # CROSS-BUSINESS REPORTS (owner-only)
  # ------------------------------------------------------------------

  /reports/cross-business-customers:
    get:
      summary: "Customers who have used more than one business in the account"
      operationId: crossBusinessCustomers
      x-status: "current"
      tags: [reports]
      x-required-permissions:
        all: ["view.cross_business", "view.customer", "view.financial"]
      parameters:
        - name: minBusinesses
          in: query
          schema:
            type: integer
            default: 2
          description: "Minimum number of distinct businesses to qualify"
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: "Customers with multi-business activity. PII masked unless view.customer.pii."
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/CustomerResponse"
                        - type: object
                          properties:
                            businessUsage:
                              type: array
                              items:
                                type: object
                                properties:
                                  businessId:
                                    type: string
                                    format: uuid
                                  businessName:
                                    type: string
                                  firstSeenAt:
                                    type: string
                                    format: date-time
                                  lastActivityAt:
                                    type: string
                                    format: date-time
                                  totalSpend:
                                    type: string
                                    nullable: true
                                    description: "Only populated when user has view.financial."
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"

  # ------------------------------------------------------------------
  # HEALTH / METADATA
  # ------------------------------------------------------------------

  /health:
    get:
      summary: "Health check"
      operationId: healthCheck
      security: []
      tags: [meta]
      responses:
        "200":
          description: "Healthy"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                  version:
                    type: string
                  timestamp:
                    type: string
                    format: date-time

# ============================================================
# TAGS
# ============================================================
tags:
  - name: auth
    description: "Authentication and session management"
  - name: accounts
    description: "Account-level settings (owner-scoped)"
  - name: businesses
    description: "Businesses within the account"
  - name: users
    description: "User management, roles, and permission overrides"
  - name: customers
    description: "Customer records (shared across businesses within account)"
  - name: properties
    description: "Property records (shared across businesses within account)"
  - name: participants
    description: "Transaction participants (realtors, TCs, lenders, attorneys)"
  - name: agencies
    description: "Brokerages and similar organizations"
  - name: services
    description: "Services catalog per business"
  - name: technician-availability
    description: "Technician hours, time-off, ZIP coverage, service duration overrides"
  - name: calendar
    description: "Available slot finder"
  - name: inspections
    description: "Inspection lifecycle management"
  - name: audit
    description: "Audit log queries"
  - name: reports
    description: "Cross-business and financial reports (owner-only)"
  - name: meta
    description: "Health and metadata endpoints"

