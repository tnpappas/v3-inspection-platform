        userDisplayName:
          type: string
          nullable: true
        sessionId:
          type: string
          nullable: true
        requestId:
          type: string
          format: uuid
          nullable: true
        action:
          type: string
        outcome:
          type: string
          enum: [success, denied, failed, partial]
        entityType:
          type: string
        entityId:
          type: string
          format: uuid
          nullable: true
        changes:
          type: object
          nullable: true
          description: "May contain PII snapshots. Only returned when user has view.audit_log."
        ipAddress:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

# ============================================================
# GLOBAL SECURITY
# ============================================================
security:
  - sessionCookie: []

# ============================================================
# PATHS
# ============================================================
paths:

  # ------------------------------------------------------------------
  # AUTH
  # ------------------------------------------------------------------

  /auth/login:
    post:
      summary: "Log in with email and password"
      operationId: authLogin
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                businessId:
                  type: string
                  format: uuid
                  description: "Optional. If omitted, defaults to the user's primary business (lowest joinedAt). Set by the client after login to activate the correct business context."
      responses:
        "200":
          description: "Authenticated. Session cookie set."
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UserResponse"
                  - type: object
                    properties:
                      activeBusiness:
                        $ref: "#/components/schemas/BusinessResponse"
                      effectivePermissions:
                        type: array
                        items:
                          type: string
        "400":
          description: "Invalid email or password format"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Invalid credentials"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      summary: "Log out and destroy session"
      operationId: authLogout
      tags: [auth]
      responses:
        "204":
          description: "Session destroyed"

  /auth/me:
    get:
      summary: "Get current authenticated user with active business and permissions"
      operationId: authMe
      tags: [auth]
      responses:
        "200":
          description: "Current user"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UserResponse"
                  - type: object
                    properties:
                      activeBusiness:
                        $ref: "#/components/schemas/BusinessResponse"
                      effectivePermissions:
                        type: array
                        items:
                          type: string
        "401":
          description: "Not authenticated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/switch-business:
    post:
      summary: "Switch active business context in session"
      operationId: authSwitchBusiness
      tags: [auth]
      x-required-permissions:
        all: ["view.business"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [businessId]
              properties:
                businessId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: "Business context switched"
          content:
            application/json:
              schema:
                type: object
                properties:
                  activeBusiness:
                    $ref: "#/components/schemas/BusinessResponse"
                  effectivePermissions:
                    type: array
                    items:
                      type: string
        "403":
          description: "User does not belong to this business"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Business not found (or cross-account)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ------------------------------------------------------------------
  # ACCOUNTS
  # ------------------------------------------------------------------

  /accounts/me:
    get:
      summary: "Get the current account"
      operationId: getMyAccount
      tags: [accounts]
      x-required-permissions:
        all: ["view.business"]
      responses:
        "200":
          description: "Account record"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountResponse"

    patch:
      summary: "Update account configuration"
      operationId: updateAccount
      tags: [accounts]
      x-required-permissions:
        all: ["manage.account_config"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                config:
                  type: object
                  additionalProperties: true
                  description: "Partial update to accounts.config. Merged (not replaced)."
      responses:
        "200":
          description: "Updated account"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountResponse"
        "403":
          description: "Permission denied"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ------------------------------------------------------------------
  # BUSINESSES
  # ------------------------------------------------------------------

  /businesses:
    get:
      summary: "List businesses the current user belongs to"
      operationId: listBusinesses
      tags: [businesses]
      x-required-permissions:
        all: ["view.business"]
      responses:
        "200":
          description: "List of businesses, ordered by displayOrder"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/BusinessResponse"

    post:
      summary: "Create a new business in the account"
      operationId: createBusiness
      tags: [businesses]
      x-required-permissions:
        all: ["manage.business"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug, type]
              properties:
                name:
                  type: string
                slug:
                  type: string
                  description: "URL-safe slug, unique within account"
                type:
                  type: string
                  enum: [inspection, pool, pest, other]
                logoUrl:
                  type: string
                  nullable: true
                primaryColor:
                  type: string
                  nullable: true
                address1:
                  type: string
                  nullable: true
                city:
                  type: string
                  nullable: true
                state:
                  type: string
                  nullable: true
                zip:
                  type: string
                  nullable: true
                phone:
                  type: string
                  nullable: true
                email:
                  type: string
                  nullable: true
                website:
                  type: string
                  nullable: true
                config:
                  type: object
                  additionalProperties: true
      responses:
        "201":
          description: "Business created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessResponse"
        "409":
          description: "Slug already exists within account"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /businesses/{id}:
    get:
      summary: "Get a specific business"
      operationId: getBusiness
      tags: [businesses]
      x-required-permissions:
        all: ["view.business"]
      parameters:
        - $ref: "#/components/parameters/pathId"
      responses:
        "200":
          description: "Business record"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      summary: "Update business settings"
      operationId: updateBusiness
      tags: [businesses]
      x-required-permissions:
        all: ["manage.business_config"]
      parameters:
        - $ref: "#/components/parameters/pathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                logoUrl:
                  type: string
                  nullable: true
                primaryColor:
                  type: string
                  nullable: true
                phone:
                  type: string
                  nullable: true
                email:
                  type: string
                  nullable: true
                website:
                  type: string
                  nullable: true
                displayOrder:
                  type: integer
                config:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: "Updated business"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessResponse"

  # ------------------------------------------------------------------
  # USERS
  # ------------------------------------------------------------------

  /users:
    get:
      summary: "List users in the active business"
      operationId: listUsers
      tags: [users]
      x-required-permissions:
        all: ["view.user"]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, invited]
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: "Paginated user list"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserResponse"
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"

    post:
      summary: "Invite a new user to the active business"
      operationId: inviteUser
      tags: [users]
      x-required-permissions:
        all: ["manage.user"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, displayName, role]
              properties:
                email:
                  type: string
                  format: email
                displayName:
                  type: string
                role:
                  type: string
                  enum: [owner, operations_manager, dispatcher, technician, client_success, bookkeeper, viewer]
                roleExpiresAt:
                  type: string
                  format: date-time
                  nullable: true
                  description: "Optional expiration for the initial role grant."
      responses:
        "201":
          description: "User invited. Invitation email sent."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "409":
          description: "Email already in use within this account"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}:
    get:
      summary: "Get a user"
      operationId: getUser
      tags: [users]
      x-required-permissions:
        all: ["view.user"]
      parameters:
        - $ref: "#/components/parameters/pathId"
      responses:
        "200":
          description: "User record"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      summary: "Update a user's profile or status"
      operationId: updateUser
      tags: [users]
      x-required-permissions:
        all: ["manage.user"]
      parameters:
        - $ref: "#/components/parameters/pathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                phone:
                  type: string
                  nullable: true
                mobile:
                  type: string
                  nullable: true
                status:
                  type: string
                  enum: [active, inactive]
                smsOptIn:
                  type: boolean
                emailOptIn:
                  type: boolean
      responses:
        "200":
          description: "Updated user"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"

  /users/{id}/roles:
    get:
      summary: "List roles for a user in the active business"
      operationId: listUserRoles
      tags: [users]
      x-required-permissions:
        all: ["view.user.roles"]
      parameters:
        - $ref: "#/components/parameters/pathId"
      responses:
        "200":
          description: "User roles"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserRoleResponse"

    post:
      summary: "Grant a role to a user in the active business"
      operationId: grantUserRole
      tags: [users]
      x-required-permissions:
        all: ["manage.user.roles"]
      parameters:
        - $ref: "#/components/parameters/pathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [owner, operations_manager, dispatcher, technician, client_success, bookkeeper, viewer]
                expiresAt:
                  type: string
                  format: date-time
                  nullable: true
                expirationReason:
                  type: string
                  nullable: true
      responses:
        "201":
          description: "Role granted"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserRoleResponse"
        "409":
          description: "Role already held"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}/roles/{role}:
    delete:
      summary: "Revoke a role from a user"
      operationId: revokeUserRole
      tags: [users]
      x-required-permissions:
        all: ["manage.user.roles"]
      parameters:
        - $ref: "#/components/parameters/pathId"
        - name: role
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: "Role revoked"
        "404":
          description: "Role not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}/permissions:
    get:
      summary: "Get effective permissions for a user in the active business"
      operationId: getUserEffectivePermissions
      tags: [users]
      x-required-permissions:
        all: ["manage.user.permissions"]
      parameters:
        - $ref: "#/components/parameters/pathId"
      responses:
        "200":
          description: "Effective permissions breakdown"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EffectivePermissionsResponse"

  /users/{id}/permission-overrides:
    post:
      summary: "Grant or deny a specific permission (or group) for a user"
      operationId: createPermissionOverride
      tags: [users]
      x-required-permissions:
        all: ["manage.user.permissions"]
      parameters:
        - $ref: "#/components/parameters/pathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [effect]
              properties:
                permissionKey:
                  type: string
                  description: "One of permissionKey or groupKey required."
                  nullable: true
                groupKey:
                  type: string
                  nullable: true
                effect:
                  type: string
                  enum: [grant, deny]
                reason:
                  type: string
                  description: "Required for sensitive permissions."
                expiresAt:
                  type: string
                  format: date-time
                  nullable: true
      responses:
        "201":
          description: "Override created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPermissionOverrideResponse"
        "400":
          description: "Missing reason for sensitive permission, or both/neither target specified"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}/permission-overrides/{overrideId}:
    delete:
      summary: "Revoke a permission override"
      operationId: deletePermissionOverride
      tags: [users]
      x-required-permissions:
        all: ["manage.user.permissions"]
      parameters:
        - $ref: "#/components/parameters/pathId"
        - name: overrideId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: "Override revoked"
        "404":
          description: "Override not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ------------------------------------------------------------------
  # CUSTOMERS
  # ------------------------------------------------------------------

  /customers:
    get:
      summary: "List customers in the active account (scoped to businesses the user can see)"
      operationId: listCustomers
      tags: [customers]
      x-required-permissions:
        all: ["view.customer"]
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: "Search by name, email, or phone"
        - name: businessId
          in: query
          schema:
            type: string
            format: uuid
          description: "Filter to customers associated with this business"
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: "Paginated customer list. PII fields masked unless view.customer.pii."
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CustomerResponse"
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"

    post:
      summary: "Create a customer"
      operationId: createCustomer
      tags: [customers]
      x-required-permissions:
        all: ["create.customer"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [displayName]
              properties:
                displayName:
                  type: string
                firstName:
                  type: string
                  nullable: true
                lastName:
                  type: string
                  nullable: true
                email:
                  type: string
                  format: email
                  nullable: true
                phoneMobile:
                  type: string
                  nullable: true
                phoneHome:
                  type: string
                  nullable: true
                address1:
                  type: string
                  nullable: true
                city:
                  type: string
                  nullable: true
                state:
                  type: string
                  nullable: true
                zip:
                  type: string
                  nullable: true
                notes:
                  type: string
                  nullable: true
                smsOptIn:
                  type: boolean
                emailOptIn:
                  type: boolean
      responses:
        "201":
          description: "Customer created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerResponse"

  /customers/{id}:
    get:
      summary: "Get a customer"
      operationId: getCustomer
      tags: [customers]
      x-required-permissions:
        all: ["view.customer"]
      parameters:
        - $ref: "#/components/parameters/pathId"
      responses:
        "200":
          description: "Customer record. PII fields masked unless view.customer.pii."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      summary: "Update a customer"
      operationId: updateCustomer
      tags: [customers]
      x-required-permissions:
        all: ["edit.customer"]
      parameters:
        - $ref: "#/components/parameters/pathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
                firstName:
                  type: string
                  nullable: true
                lastName:
                  type: string
                  nullable: true
                email:
                  type: string
                  nullable: true
                phoneMobile:
                  type: string
                  nullable: true
                phoneHome:
                  type: string
                  nullable: true
                address1:
                  type: string
                  nullable: true
                city:
                  type: string
                  nullable: true
                state:
                  type: string
                  nullable: true
                zip:
                  type: string
                  nullable: true
                notes:
                  type: string
                  nullable: true
                smsOptIn:
                  type: boolean
                emailOptIn:
                  type: boolean
      responses:
        "200":
          description: "Updated customer"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerResponse"

  # ------------------------------------------------------------------
  # PROPERTIES
  # ------------------------------------------------------------------

  /properties:
    get:
      summary: "List properties in the active account"
      operationId: listProperties
      tags: [properties]
      x-required-permissions:
        all: ["view.property"]
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: "Search by address"
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: "Paginated property list"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PropertyResponse"
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"

    post:
      summary: "Create a property"
      operationId: createProperty
      tags: [properties]
      x-required-permissions:
        all: ["create.property"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address1, city, state, zip]
              properties:
                address1:
                  type: string
                address2:
                  type: string
                  nullable: true
                city:
                  type: string
                state:
                  type: string
                zip:
                  type: string
                county:
                  type: string
                  nullable: true
                yearBuilt:
                  type: integer
                  nullable: true
                squareFeet:
                  type: integer
                  nullable: true
                bedrooms:
                  type: integer
                  nullable: true
                bathrooms:
                  type: number
                  nullable: true
                foundation:
                  type: string
                  nullable: true
                occupancy:
                  type: string
                  nullable: true
                propertyType:
                  type: string
                  nullable: true
      responses:
        "201":
          description: "Property created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyResponse"

  /properties/{id}:
    get:
      summary: "Get a property"
      operationId: getProperty
      tags: [properties]
      x-required-permissions:
        all: ["view.property"]
      parameters:
        - $ref: "#/components/parameters/pathId"
      responses:
        "200":
          description: "Property record"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      summary: "Update a property"
      operationId: updateProperty
      tags: [properties]
      x-required-permissions:
        all: ["edit.property"]
      parameters:
        - $ref: "#/components/parameters/pathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                address1:
                  type: string
                address2:
                  type: string
                  nullable: true
                city:
                  type: string
                state:
                  type: string
                zip:
                  type: string
                yearBuilt:
                  type: integer
                  nullable: true
                squareFeet:
                  type: integer
                  nullable: true
                bedrooms:
                  type: integer
                  nullable: true
                bathrooms:
                  type: number
                  nullable: true
                foundation:
                  type: string
                  nullable: true
                occupancy:
                  type: string
                  nullable: true
                propertyType:
                  type: string
                  nullable: true
      responses:
        "200":
          description: "Updated property"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyResponse"

  # ------------------------------------------------------------------
  # SERVICES
  # ------------------------------------------------------------------

  /services:
    get:
      summary: "List services for the active business"
      operationId: listServices
      tags: [services]
      x-required-permissions:
        all: ["view.business"]
      parameters:
        - name: active
          in: query
          schema:
            type: boolean
          description: "Filter by active flag. Omit to return all."
      responses:
        "200":
          description: "Service list ordered by sequence"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ServiceResponse"

    post:
      summary: "Create a service"
      operationId: createService
      tags: [services]
      x-required-permissions:
        all: ["manage.service"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, baseFee, defaultDurationMinutes]
              properties:
                name:
                  type: string
                description:
                  type: string
                  nullable: true
                publicDescription:
                  type: string
                  nullable: true
                category:
                  type: string
                  nullable: true
                baseFee:
                  type: string
                  description: "Decimal string"
                defaultDurationMinutes:
                  type: integer
                sequence:
                  type: integer
                  default: 100
                active:
                  type: boolean
                  default: true
      responses:
        "201":
          description: "Service created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceResponse"

  /services/{id}:
    patch:
      summary: "Update a service"
      operationId: updateService
      tags: [services]
      x-required-permissions:
        all: ["manage.service"]
      parameters:
        - $ref: "#/components/parameters/pathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                  nullable: true
                publicDescription:
                  type: string
                  nullable: true
                category:
                  type: string
                  nullable: true
                baseFee:
                  type: string
                defaultDurationMinutes:
                  type: integer
                sequence:
                  type: integer
                active:
                  type: boolean
      responses:
        "200":
          description: "Updated service"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceResponse"

  # ------------------------------------------------------------------
