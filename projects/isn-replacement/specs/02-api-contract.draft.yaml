openapi: "3.0.3"

info:
  title: "ISN Replacement API — Scheduling Slice"
  version: "0.1.0"
  description: |
    REST API contract for the ISN replacement system (isn-killer), scheduling slice.

    ## Conventions

    ### Authentication
    Session-based only. Passport.js local strategy (email + password). Sessions stored
    in Postgres via connect-pg-simple. No bearer tokens for human-facing API surfaces.
    Cookies: httpOnly, secure (production), sameSite=strict. All requests must carry
    the session cookie. MFA verification is required for sensitive permission grants
    when accounts.config.security.requireMfaForPermissionGrants=true.

    ### Permission model
    Every endpoint declares required permissions via the x-required-permissions extension.
    Effective permissions = role defaults (from role_permissions) UNION per-user grants
    MINUS per-user denies (from user_permission_overrides). See 06-security-spec.md S11.

    ```yaml
    x-required-permissions:
      all: ["edit.inspection.assign"]       # all listed permissions required
      any: ["manage.refund", "override.X"]  # at least one required
    ```

    ### PII masking
    Endpoints returning customer/property PII apply runtime masking based on the
    requesting user's effective permissions. Schemas mark PII fields with x-pii-fields.
    Users with view.customer.pii (or a group containing it) receive unmasked values;
    others receive masked strings (e.g., email: "j****@example.com",
    phone: "***-***-1234"). See 06-security-spec.md S11 PII masking pattern.

    ### Error envelope
    All errors use the following shape:
    ```json
    {
      "error": {
        "code": "permission_denied",
        "message": "Human-readable message",
        "details": {},
        "requestId": "<uuid>"
      }
    }
    ```
    Common error codes: validation_failed, unauthenticated, permission_denied,
    not_found, conflict, semantic_error, rate_limited, internal_error.

    ### Status codes
    - 200 Success
    - 201 Created
    - 204 No content
    - 400 Validation failure
    - 401 Unauthenticated
    - 403 Forbidden (user can see entity exists but lacks specific action permission)
    - 404 Not found / cross-account hide / no-permission hide (see Security: 404-over-403)
    - 409 Conflict (unique constraint, optimistic concurrency)
    - 422 Semantic validation failure
    - 429 Rate limited
    - 500 Server error

    ### Security: 404 over 403 for cross-account and no-permission hides
    CRITICAL: When a user queries an entity that exists in another account, or an
    entity they cannot see exists at all (RLS hides it), respond 404 — NEVER 403.
    403 is only returned when the user can verify the entity exists but lacks
    permission for the specific action (e.g., they can GET it but not DELETE it).
    This prevents account enumeration.

    ### Pagination
    Cursor-based on all unbounded lists. No offset pagination anywhere.
    Query params: cursor (opaque base64), pageSize (default 50, max 200).
    Response envelope:
    ```json
    {
      "data": [...],
      "pagination": { "nextCursor": "<base64>|null", "hasMore": true, "pageSize": 50 }
    }
    ```
    Bounded config lists (services, businesses, users within a business) use the
    same cursor shape but are typically small enough to return in one page.

    ### Audit logging
    Every state-changing endpoint produces an audit_log row. The API does not expose
    this in each endpoint description; it is a framework-level concern. Log entries
    include: action, outcome, entityType, entityId, userId, accountId, businessId,
    sessionId, requestId, ipAddress, userAgent, changes.

    ### on_hold scheduledAt sentinel
    Inspections with status=on_hold have scheduledAt=9999-12-31T23:59:59Z
    (ON_HOLD_PLACEHOLDER_AT constant). The API serialization layer detects this
    sentinel and returns scheduledAt=null and a pendingSchedule=true flag in
    inspection responses. Clients must not render year-9999 dates.

    ### Cancellation vs soft-delete
    POST /api/inspections/{id}/cancel — operational cancellation (status=cancelled,
    sets cancelledAt/cancelledBy/cancelReason). Requires cancel.inspection permission.
    DELETE /api/inspections/{id} — administrative soft-delete (sets deletedAt/deletedBy/
    deleteReason). Requires delete.inspection permission. These are distinct operations.

    ### Rate limiting
    Responses include X-RateLimit-Limit, X-RateLimit-Remaining, X-RateLimit-Reset
    headers. Specific limits are operational tuning; see open question #6 in handoff.md.

servers:
  - url: "https://{host}/api"
    description: "Application server"
    variables:
      host:
        default: "localhost:5000"

# ============================================================
# SECURITY SCHEMES
# ============================================================
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: connect.sid
      description: "Server-side session cookie. Obtained via POST /api/auth/login."

  # ============================================================
  # SHARED PARAMETERS
  # ============================================================
  parameters:
    cursor:
      name: cursor
      in: query
      schema:
        type: string
      description: "Opaque base64-encoded cursor for cursor pagination."
    pageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
      description: "Page size. Clamped to 200."
    pathId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    businessId:
      name: businessId
      in: query
      required: true
      schema:
        type: string
        format: uuid
      description: "Active business context. Must be a business the user belongs to."

  # ============================================================
  # SHARED SCHEMAS
  # ============================================================
  schemas:

    # --- Envelopes ---

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId]
          properties:
            code:
              type: string
              enum:
                - validation_failed
                - unauthenticated
                - permission_denied
                - not_found
                - conflict
                - semantic_error
                - rate_limited
                - system_user_login_attempted
                - internal_error
            message:
              type: string
            details:
              type: object
              additionalProperties: true
            requestId:
              type: string
              format: uuid

    PaginationMeta:
      type: object
      required: [nextCursor, hasMore, pageSize]
      properties:
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean
        pageSize:
          type: integer

    # --- Identity ---

    AccountResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        status:
          type: string
          enum: [active, suspended, inactive]
        planTier:
          type: string
        config:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BusinessResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        accountId:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        type:
          type: string
          enum: [inspection, pool, pest, other]
        status:
          type: string
          enum: [active, inactive]
        logoUrl:
          type: string
          nullable: true
        primaryColor:
          type: string
          nullable: true
        address1:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
        zip:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        displayOrder:
          type: integer
        config:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserResponse:
      type: object
      x-pii-fields: [email, username, firstName, lastName, displayName, phone, mobile, fax, address1, address2, city, state, zip, county, license, photoUrl]
      properties:
        id:
          type: string
          format: uuid
        accountId:
          type: string
          format: uuid
        email:
          type: string
          x-pii: contact_email
        username:
          type: string
          nullable: true
          x-pii: name
        firstName:
          type: string
          nullable: true
          x-pii: name
        lastName:
          type: string
          nullable: true
          x-pii: name
        displayName:
          type: string
          x-pii: name
        phone:
          type: string
          nullable: true
          x-pii: phone
        mobile:
          type: string
          nullable: true
          x-pii: phone
        address1:
          type: string
          nullable: true
          x-pii: address
        city:
          type: string
          nullable: true
          x-pii: address
        state:
          type: string
          nullable: true
          x-pii: address
        zip:
          type: string
          nullable: true
          x-pii: address
        license:
          type: string
          nullable: true
          x-pii: government_id
        photoUrl:
          type: string
          nullable: true
          x-pii: name
        status:
          type: string
          enum: [active, inactive, invited]
        isSystem:
          type: boolean
        emailVerifiedAt:
          type: string
          format: date-time
          nullable: true
        smsOptIn:
          type: boolean
        emailOptIn:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserRoleResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        role:
          type: string
          enum: [owner, operations_manager, dispatcher, technician, client_success, bookkeeper, viewer]
        grantedAt:
          type: string
          format: date-time
        grantedBy:
          type: string
          format: uuid
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        expirationReason:
          type: string
          nullable: true

    EffectivePermissionsResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        permissions:
          type: array
          items:
            type: string
          description: "All resolved permission keys after role defaults + grants - denies."
        roleDefaults:
          type: array
          items:
            type: string
        grants:
          type: array
          items:
            $ref: "#/components/schemas/UserPermissionOverrideResponse"
        denies:
          type: array
          items:
            $ref: "#/components/schemas/UserPermissionOverrideResponse"

    UserPermissionOverrideResponse:
      type: object
      properties:
        id:
          type: string
          description: "Synthetic composite key representation for reference."
        userId:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        permissionKey:
          type: string
          nullable: true
        groupKey:
          type: string
          nullable: true
        effect:
          type: string
          enum: [grant, deny]
        reason:
          type: string
          nullable: true
        grantedBy:
          type: string
          format: uuid
          nullable: true
        grantedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          nullable: true

    # --- Customers & Properties ---

    CustomerResponse:
      type: object
      x-pii-fields: [email, phoneMobile, phoneHome, phoneWork, address1, address2, city, state, zip, notes]
      properties:
        id:
          type: string
          format: uuid
        accountId:
          type: string
          format: uuid
        displayName:
          type: string
          x-pii: name
        firstName:
          type: string
          nullable: true
          x-pii: name
        lastName:
          type: string
          nullable: true
          x-pii: name
        email:
          type: string
          nullable: true
          x-pii: contact_email
        phoneMobile:
          type: string
          nullable: true
          x-pii: phone
        phoneHome:
          type: string
          nullable: true
          x-pii: phone
        phoneWork:
          type: string
          nullable: true
          x-pii: phone
        address1:
          type: string
          nullable: true
          x-pii: address
        address2:
          type: string
          nullable: true
          x-pii: address
        city:
          type: string
          nullable: true
          x-pii: address
        state:
          type: string
          nullable: true
          x-pii: address
        zip:
          type: string
          nullable: true
          x-pii: address
        notes:
          type: string
          nullable: true
          x-pii: notes
        smsOptIn:
          type: boolean
        emailOptIn:
          type: boolean
        status:
          type: string
          enum: [active, inactive]
        businessUsage:
          type: array
          description: "Which businesses have served this customer (customer_businesses rows)."
          items:
            type: object
            properties:
              businessId:
                type: string
                format: uuid
              businessName:
                type: string
              firstSeenAt:
                type: string
                format: date-time
              lastActivityAt:
                type: string
                format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PropertyResponse:
      type: object
      x-pii-fields: [address1, address2, city, state, zip, county, latitude, longitude]
      properties:
        id:
          type: string
          format: uuid
        accountId:
          type: string
          format: uuid
        address1:
          type: string
          x-pii: address
        address2:
          type: string
          nullable: true
          x-pii: address
        city:
          type: string
          x-pii: address
        state:
          type: string
          x-pii: address
        zip:
          type: string
          x-pii: address
        county:
          type: string
          nullable: true
          x-pii: address
        latitude:
          type: number
          nullable: true
          x-pii: location_precise
        longitude:
          type: number
          nullable: true
          x-pii: location_precise
        yearBuilt:
          type: integer
          nullable: true
        squareFeet:
          type: integer
          nullable: true
        bedrooms:
          type: integer
          nullable: true
        bathrooms:
          type: number
          nullable: true
        foundation:
          type: string
          nullable: true
        occupancy:
          type: string
          nullable: true
        propertyType:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TransactionParticipantResponse:
      type: object
      x-pii-fields: [email, phone, mobile]
      properties:
        id:
          type: string
          format: uuid
        accountId:
          type: string
          format: uuid
        agencyId:
          type: string
          format: uuid
          nullable: true
        displayName:
          type: string
          x-pii: name
        firstName:
          type: string
          nullable: true
          x-pii: name
        lastName:
          type: string
          nullable: true
          x-pii: name
        email:
          type: string
          nullable: true
          x-pii: contact_email
        phone:
          type: string
          nullable: true
          x-pii: phone
        mobile:
          type: string
          nullable: true
          x-pii: phone
        primaryRole:
          type: string
          nullable: true
          enum: [buyer_agent, listing_agent, transaction_coordinator, escrow_officer, insurance_agent, lender, attorney, seller, other]
        status:
          type: string
          enum: [active, inactive]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AgencyResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        accountId:
          type: string
          format: uuid
        name:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
        zip:
          type: string
          nullable: true
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # --- Services ---

    ServiceResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        publicDescription:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        baseFee:
          type: string
          description: "Decimal string, e.g. '350.00'"
        defaultDurationMinutes:
          type: integer
        sequence:
          type: integer
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # --- Technician Availability ---

    TechnicianHoursResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        dayOfWeek:
          type: integer
          minimum: 0
          maximum: 6
          description: "0=Sunday, 6=Saturday"
        startTime:
          type: string
          pattern: "^[0-2][0-9]:[0-5][0-9]$"
          description: "HH:MM 24-hour"
        endTime:
          type: string
          pattern: "^[0-2][0-9]:[0-5][0-9]$"
        effectiveFrom:
          type: string
          format: date-time
          nullable: true
        effectiveTo:
          type: string
          format: date-time
          nullable: true

    TechnicianTimeOffResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        reason:
          type: string
          nullable: true

    TechnicianZipResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        zip:
          type: string
        priority:
          type: integer
          minimum: 1
          maximum: 5

    AvailableSlotResponse:
      type: object
      properties:
        inspectorId:
          type: string
          format: uuid
        inspectorName:
          type: string
        scheduledAt:
          type: string
          format: date-time
          description: "Start of the available slot (UTC)"
        durationMinutes:
          type: integer
        explanation:
          type: string
          description: "Human-readable explanation, e.g. 'Primary territory match, 30-min buffer respected'"

    # --- Inspections ---

    InspectionServiceLineItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        serviceId:
          type: string
          format: uuid
        serviceName:
          type: string
        fee:
          type: string
          description: "Decimal string"
        durationMinutes:
          type: integer
          nullable: true
        notes:
          type: string
          nullable: true

    InspectionParticipantItem:
      type: object
      properties:
        participantId:
          type: string
          format: uuid
        displayName:
          type: string
          x-pii: name
        roleInTransaction:
          type: string
          enum: [buyer_agent, listing_agent, transaction_coordinator, escrow_officer, insurance_agent, lender, attorney, seller, other]
        email:
          type: string
          nullable: true
          x-pii: contact_email
        phone:
          type: string
          nullable: true
          x-pii: phone
        agencyName:
          type: string
          nullable: true

    InspectionResponse:
      type: object
      x-pii-fields: [via customer and property FKs — see CustomerResponse and PropertyResponse]
      properties:
        id:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        orderNumber:
          type: string
          description: "Format: {prefix}-{year}-{seq:06d}, e.g. SH-2026-001234"
        status:
          type: string
          enum: [scheduled, confirmed, en_route, in_progress, completed, cancelled, no_show, on_hold]
        paymentStatus:
          type: string
          enum: [unpaid, partial, paid, refunded, disputed]
        signatureStatus:
          type: string
          enum: [unsigned, signed, expired]
        qaStatus:
          type: string
          enum: [not_reviewed, in_review, approved, rejected]
        reportReleased:
          type: boolean
        reportReleasedAt:
          type: string
          format: date-time
          nullable: true
        scheduledAt:
          type: string
          format: date-time
          nullable: true
          description: |
            Null when status=on_hold (sentinel 9999-12-31T23:59:59Z is translated
            to null by the serialization layer). ISO 8601 UTC otherwise.
        pendingSchedule:
          type: boolean
          description: "True when status=on_hold and no date is locked."
        durationMinutes:
          type: integer
        leadInspector:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            displayName:
              type: string
        customer:
          $ref: "#/components/schemas/CustomerResponse"
          nullable: true
          description: "Null when not yet linked. PII fields subject to view.customer.pii."
        property:
          $ref: "#/components/schemas/PropertyResponse"
          nullable: true
        participants:
          type: array
          items:
            $ref: "#/components/schemas/InspectionParticipantItem"
        services:
          type: array
          items:
            $ref: "#/components/schemas/InspectionServiceLineItem"
        feeAmount:
          type: string
          description: "Decimal string total fee"
        specialInstructions:
          type: string
          nullable: true
          x-pii: notes
        internalNotes:
          type: string
          nullable: true
          x-pii: notes
          description: "Only returned when user has view.inspection.internal_notes permission."
        customFields:
          type: object
          additionalProperties: true
        billToParticipantId:
          type: string
          format: uuid
          nullable: true
        source:
          type: string
          enum: [dispatcher, realtor_portal, client_booking, phone, email, api]
        confirmedAt:
          type: string
          format: date-time
          nullable: true
        confirmedBy:
          type: string
          format: uuid
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        initialCompletedAt:
          type: string
          format: date-time
          nullable: true
        cancelledAt:
          type: string
          format: date-time
          nullable: true
        cancelReason:
          type: string
          nullable: true
        rescheduleCount:
          type: integer
          description: "Computed from reschedule_history; not stored as a column."
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RescheduleHistoryItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        inspectionId:
          type: string
          format: uuid
        previousScheduledAt:
          type: string
          format: date-time
          nullable: true
        newScheduledAt:
          type: string
          format: date-time
          nullable: true
        previousInspectorId:
          type: string
          format: uuid
          nullable: true
        newInspectorId:
          type: string
          format: uuid
          nullable: true
        reason:
          type: string
          nullable: true
        initiatedBy:
          type: string
          format: uuid
          nullable: true
