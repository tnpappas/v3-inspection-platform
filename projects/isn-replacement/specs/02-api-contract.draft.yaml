          description: "Technician hours"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TechnicianHoursResponse"

    post:
      summary: "Add a recurring shift"
      operationId: createTechnicianHours
      tags: [technician-availability]
      x-required-permissions:
        all: ["manage.technician_availability"]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dayOfWeek, startTime, endTime]
              properties:
                dayOfWeek:
                  type: integer
                  minimum: 0
                  maximum: 6
                startTime:
                  type: string
                endTime:
                  type: string
                effectiveFrom:
                  type: string
                  format: date-time
                  nullable: true
                effectiveTo:
                  type: string
                  format: date-time
                  nullable: true
      responses:
        "201":
          description: "Hours created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TechnicianHoursResponse"

  /technicians/{userId}/hours/{id}:
    delete:
      summary: "Remove a recurring shift"
      operationId: deleteTechnicianHours
      tags: [technician-availability]
      x-required-permissions:
        all: ["manage.technician_availability"]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/pathId"
      responses:
        "204":
          description: "Shift removed"

  /technicians/{userId}/time-off:
    get:
      summary: "List time-off windows for a technician"
      operationId: listTechnicianTimeOff
      tags: [technician-availability]
      x-required-permissions:
        all: ["view.business"]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: "Time-off windows"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TechnicianTimeOffResponse"

    post:
      summary: "Add a time-off window"
      operationId: createTechnicianTimeOff
      tags: [technician-availability]
      x-required-permissions:
        all: ["manage.technician_availability"]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [startsAt, endsAt]
